<section class="section-card">

  <div class="loading" *ngIf="loading">Cargando tu perfil...</div>
  <div class="alert" *ngIf="error && !loading">{{ error }}</div>

  <div *ngIf="!loading && !error && user" class="series-groups">
    <app-serie-group
      title="Empezadas"
      [series]="user.seriesEmpezadas || []"
      emptyMessage="Aún no has comenzado ninguna serie."
      (selectSerie)="openSerie($event)">
    </app-serie-group>

    <app-serie-group
      title="Pendientes"
      [series]="user.seriesPendientes || []"
      emptyMessage="No tienes series pendientes."
      (selectSerie)="openSerie($event)">
    </app-serie-group>

    <app-serie-group
      title="Terminadas"
      [series]="user.seriesTerminadas || []"
      emptyMessage="No has completado ninguna serie."
      (selectSerie)="openSerie($event)">
    </app-serie-group>
  </div>
</section>
